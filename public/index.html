<!DOCTYPE html>
<html>
  <head>
    <title>LogicKey</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Logi<span>Key</span></h1>
      <p class="subtitle">the key to your problems</p>
    </header>
    <!--the two-column grid that holds both panels side by side -->
    <div class="app-wrapper">
      <!--the first panel that holds the upload zone and the preview image -->
      <div class="panel">
        <div class="panel-header">
          <div class="dot"></div>
          <span>input — schematic upload</span>
          <button class="key-btn" id="keyBtn">Key ↗</button>
        </div>
        <div class="panel-body">
          <!--the upload zone -->
          <div class="upload-area" id="uploadZone">
            <input type="file" id="imageInput" accept="image/*" />
            <div class="upload-icon">         
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.8">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <p><strong>Click to upload</strong> or drag & drop</p>
            <p>PNG, JPG, SVG · max 10 MB</p>  
          </div>
          <!--the preview image container -->
          <div class="preview-container">
            <img id="previewImage" src="" style="display:none;" />
            <span id="previewPlaceholder">[ no image loaded ]</span>
          </div>
          <!--the synthesize button -->
          <button id="synthesizeBtn" disabled>Synthesize Verilog</button>
        </div>
      </div>
      <!--The key panel-->
      <div class="key-panel" id="keyPanel">
        <div class="key-panel-header">
          <div class="dot"></div>
          <span>gate reference</span>
        </div>
        <div class="key-grid">
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 H36 Q54 6 54 22 Q54 38 36 38 H20 Z"/>
              <line x1="0" y1="14" x2="20" y2="14"/>
              <line x1="0" y1="30" x2="20" y2="30"/>
              <line x1="54" y1="22" x2="64" y2="22"/>
            </svg>
            <span>AND</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 6 Q28 6 54 22 Q28 38 16 38 Q26 22 16 6 Z"/>
              <line x1="0" y1="14" x2="22" y2="14"/>
              <line x1="0" y1="30" x2="22" y2="30"/>
              <line x1="54" y1="22" x2="64" y2="22"/>
            </svg>
            <span>OR</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 6 L14 38 L50 22 Z"/>
              <circle cx="54" cy="22" r="4"/>
              <line x1="0" y1="22" x2="14" y2="22"/>
              <line x1="58" y1="22" x2="64" y2="22"/>
            </svg>
            <span>NOT</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 6 H32 Q48 6 48 22 Q48 38 32 38 H16 Z"/>
              <circle cx="52" cy="22" r="4"/>
              <line x1="0" y1="14" x2="16" y2="14"/>
              <line x1="0" y1="30" x2="16" y2="30"/>
              <line x1="56" y1="22" x2="64" y2="22"/>
            </svg>
            <span>NAND</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 6 Q26 6 50 22 Q26 38 14 38 Q24 22 14 6 Z"/>
              <circle cx="54" cy="22" r="4"/>
              <line x1="0" y1="14" x2="15" y2="14"/>
              <line x1="0" y1="30" x2="15" y2="30"/>
              <line x1="58" y1="22" x2="64" y2="22"/>
            </svg>
            <span>NOR</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 Q32 6 54 22 Q32 38 20 38 Q30 22 20 6 Z"/>
              <path d="M14 6 Q24 22 14 38" fill="none"/>
              <line x1="0" y1="14" x2="17" y2="14"/>
              <line x1="0" y1="30" x2="17" y2="30"/>
              <line x1="54" y1="22" x2="64" y2="22"/>
            </svg>
            <span>XOR</span>
          </div>
          <div class="key-card">
            <svg width="64" height="44" viewBox="0 0 64 44" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 Q30 6 50 22 Q30 38 18 38 Q28 22 18 6 Z"/>
              <path d="M12 6 Q22 22 12 38" fill="none"/>
              <circle cx="54" cy="22" r="4"/>
              <line x1="0" y1="14" x2="15" y2="14"/>
              <line x1="0" y1="30" x2="15" y2="30"/>
              <line x1="58" y1="22" x2="64" y2="22"/>
            </svg>
            <span>XNOR</span>
          </div>
        </div>
      </div>
      <!--the second panel that holds the terminal and the code output -->
      <div class="panel">
        <div class="panel-header">
          <div class="dot"></div>
          <span>output — verilog</span>
        </div>
        <div class="panel-body" style="padding:0;">
          <!--the terminal wrapper -->
          <div class="terminal-wrapper">
            <div class="terminal-toolbar">
              <span class="terminal-lang-badge">Verilog</span>
              <button class="terminal-copy-btn">Copy</button>
              <!--the terminal textarea -->
            </div>
            <textarea id="code-terminal" readonly></textarea>
          </div>   
        </div>
      </div>
      <!--the status bar at the bottom of the page -->
      <div class="status-bar">
        <span class="status-dot idle" id="statusDot"></span>
        <span id="statusText">ready — awaiting input</span>
      </div>
    </div>
    <!--the history section that holds the history of the syntheses -->
    <div class="history-section">
      <div class="history-header">
        <div class="dot"></div>
        <span>synthesis history</span>
      </div>
      <div class="history-grid" id="historyGrid">
      </div>
    </div>

    <script src="script.js"></script>
  </body>
    
</html>
